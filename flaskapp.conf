server {
    server_name vedantpro.shop www.vedantpro.shop;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/vedantpro.shop/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/vedantpro.shop/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}

server {
    if ($host = www.vedantpro.shop) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = vedantpro.shop) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name vedantpro.shop www.vedantpro.shop;
    return 404; # managed by Certbot




}